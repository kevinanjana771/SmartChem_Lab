name: SmartChem CI/CD Pipeline

on:
  push:
    branches: [ "main", "frontendHosting" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    env:
      # These will be pulled from GitHub Settings > Secrets > Actions
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            SmartChem_backend/package-lock.json
            SmartChem_frontend/package-lock.json

      # --- BACKEND PIPELINE ---
      - name: Setup Backend
        run: |
          cd SmartChem_backend
          npm install
          # npm test # Uncomment when you add tests!

      # --- FRONTEND PIPELINE ---
      - name: Setup Frontend
        run: |
          cd SmartChem_frontend
          npm install
          npm run build

      # --- AUTOMATIC DEPLOYMENT (Vercel) ---
      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts to Vercel
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Backend Deployment Placeholder
        run: echo "Deploying SmartChem Backend... (Add your AWS/Heroku commands here)"
